version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: emissio
      POSTGRES_PASSWORD: emissio123
      POSTGRES_DB: emissio
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://emissio:emissio123@db:5432/emissio
      SECRET_KEY: ${SECRET_KEY}
      MAX_BOT_TOKEN: ${MAX_BOT_TOKEN}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
